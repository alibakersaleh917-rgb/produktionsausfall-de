palette:
  bg: "#0a1222"
  bg_soft: "#111c33"
  card: "rgba(17, 30, 54, 0.78)"
  card_strong: "rgba(20, 34, 62, 0.96)"
  text: "#ecf3ff"
  text_muted: "#9fb3db"
  line: "rgba(160, 185, 255, 0.24)"
  brand_1: "#5b8cff"
  brand_2: "#33d0ff"
  accent: "#ff7aa2"
  success: "#4ade80"

background:
  body_gradient_1: "radial-gradient(1200px 700px at 10% -20%, rgba(91,140,255,0.28), transparent 60%)"
  body_gradient_2: "radial-gradient(1000px 540px at 100% 0%, rgba(51,208,255,0.2), transparent 62%)"
  header_gradient: "linear-gradient(180deg, rgba(10,18,34,0.88), rgba(10,18,34,0.62))"

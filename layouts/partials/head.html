{{- $ctx := .ctx -}}
<!DOCTYPE html>
<html lang="{{ $ctx.Site.Data.domain.language | default "de" }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .title }}</title>
  <meta name="description" content="{{ .description }}" />
  <style>{{ partial .stylePartial $ctx }}</style>
  {{ partial "analytics.html" $ctx }}
  {{ partial "structured-data.html" $ctx }}
</head>

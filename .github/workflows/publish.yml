name: Auto Publish Article

on:
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 3'
  workflow_dispatch:
    inputs:
      domain_config_path:
        description: "Path to domain config file (YAML/JSON)"
        required: false
        default: "data/domain.yaml"

permissions:
  contents: write

env:
  DOMAIN_CONFIG_PATH: ${{ github.event.inputs.domain_config_path || 'data/domain.yaml' }}

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Fail on unresolved merge conflict markers
        run: |
          if grep -R -n -E '^(<<<<<<<|=======|>>>>>>>)' -- .; then
            echo "Unresolved merge conflict markers found."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Validate domain/theme config
        run: python scripts/validate_config.py

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Hugo smoke build
        run: hugo --gc --minify

      - name: Generate article
        run: python scripts/generate_article.py
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}
          DOMAIN_CONFIG_PATH: ${{ env.DOMAIN_CONFIG_PATH }}

      - name: Get latest article info
        id: article
        env:
          DOMAIN_CONFIG_PATH: ${{ env.DOMAIN_CONFIG_PATH }}
        run: |
          LATEST_FILE=$(ls -t content/posts/*.md | head -n 1)
          echo "latest_file=$LATEST_FILE" >> "$GITHUB_OUTPUT"

          TITLE=$(grep -m 1 '^title:' "$LATEST_FILE" | sed 's/title: "//; s/"$//')
          FILENAME=$(basename "$LATEST_FILE" .md)

          DOMAIN=$(python scripts/read_domain_meta.py --config "${DOMAIN_CONFIG_PATH}" --field domain)
          BRAND_NAME=$(python scripts/read_domain_meta.py --config "${DOMAIN_CONFIG_PATH}" --field brand_name)
          URL="https://${DOMAIN}/posts/${FILENAME}/"

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "brand_name=$BRAND_NAME" >> "$GITHUB_OUTPUT"
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git config user.name "AutoBot"
          git config user.email "bot@noreply.com"
          git add content/posts/ static/images/ || true
          if ! git diff --cached --quiet; then
            git commit -m "auto: article $(date +%Y-%m-%d)"
            git push
          else
            echo "No content/image changes to commit."
          fi

      - name: Send article email
        if: ${{ steps.article.outputs.title != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Neuer Artikel auf ${{ steps.article.outputs.brand_name }}"
          to: ${{ secrets.GMAIL_USER }}
          from: ${{ secrets.GMAIL_USER }}
          body: |
            Ein neuer Artikel wurde veröffentlicht.

            Domain:
            ${{ steps.article.outputs.domain }}

            Titel:
            ${{ steps.article.outputs.title }}

            Link:
            ${{ steps.article.outputs.url }}
